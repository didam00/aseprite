name: window-build
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [RelWithDebInfo]
        ui: [gui]
        scripting: [lua]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Skia
      shell: bash
      run: |
        this_dir=$(cygpath "${{ github.workspace }}")
        skia_url=$(source $this_dir/laf/misc/skia-url.sh | xargs)
        skia_file=$(basename $skia_url)
        curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
        unzip "$skia_file" -d skia

    - uses: aseprite/get-ninja@main
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Generating Makefiles
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_TESTS=OFF \
          -DENABLE_SCRIPTING=on \
          -DLAF_WITH_OPENSSL=OFF \
          -DENABLE_UPDATER=OFF \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=$(realpath skia) \
          -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

    - name: Compiling
      shell: bash
      run: |
        cd build && ninja aseprite

    - name: Prepare Bundle
      shell: bash
      run: |
        # 1. 출력용 폴더 생성
        mkdir -p bundle
        
        # 2. 빌드된 실행 파일과 데이터 폴더 복사
        cp -r build/bin/* bundle/
        
        # 3. 누락된 OpenSSL DLL 강제 복사
        # 윈도우 빌드 서버의 OpenSSL 설치 경로에서 직접 가져옵니다.
        cp /c/Program\ Files/OpenSSL/libcrypto-3-x64.dll bundle/ || echo "libcrypto not found in Program Files"
        cp /c/Program\ Files/OpenSSL/libssl-3-x64.dll bundle/ || echo "libssl not found in Program Files"
        
        # 4. 혹시 위 경로에 없다면 시스템 폴더에서라도 검색해서 복사
        if [ ! -f "bundle/libcrypto-3-x64.dll" ]; then
          cp /c/Windows/System32/libcrypto-3-x64.dll bundle/ || echo "libcrypto not found in System32"
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite
        path: bundle/
