name: window-build
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [RelWithDebInfo]
        ui: [gui]
        scripting: [lua]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install Skia
      shell: bash
      run: |
        this_dir=$(cygpath "${{ github.workspace }}")
        skia_url=$(source $this_dir/laf/misc/skia-url.sh | xargs)
        skia_file=$(basename $skia_url)
        curl --ssl-revoke-best-effort -L -o "$skia_file" "$skia_url"
        unzip "$skia_file" -d skia

    - uses: aseprite/get-ninja@main
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Generating Makefiles
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DENABLE_TESTS=OFF \
          -DENABLE_SCRIPTING=on \
          -DENABLE_UPDATER=OFF \
          -DLAF_BACKEND=skia \
          -DSKIA_DIR=$(realpath skia) \
          -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-x64)

    - name: Compiling
      shell: bash
      run: |
        cd build && ninja aseprite

    - name: Prepare Bundle
      shell: bash
      run: |
        mkdir -p bundle
        cp -r build/bin/* bundle


    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-aseprite
        path: bundle/
